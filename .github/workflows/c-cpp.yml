name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive      

    - name: Install toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make cmake mesa-common-dev libglu1-mesa-dev

    - name: Build
      run: make ci

    - name: Verify build artifacts
      run: |
        test -f build/comm
        echo "Build succeeded"
    - name: List build outputs
      run: ls -lah
